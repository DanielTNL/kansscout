name: KansScout
options:
  bundleIdPrefix: nl.kansscout
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # Fill in your Team ID in Xcode
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  KansScout:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KansScout
        excludes:
          - "**/*.example"
    resources:
      - path: KansScout/Resources
        excludes:
          - "**/*.example"
    info:
      path: KansScout/Info.plist
      properties:
        CFBundleName: KansScout
        CFBundleDisplayName: KansScout
        CFBundleIdentifier: nl.kansscout.app
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSUserNotificationsUsageDescription: "KansScout stuurt je elke ochtend de beste Nederlandse marktkanssen."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        INFOPLIST_FILE: KansScout/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: nl.kansscout.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
