name: Daily KansScout Analysis

on:
  schedule:
    - cron: "0 5 * * *"   # 06:00 CET (UTC+1); adjust to "0 4 * * *" in CEST (UTC+2)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

jobs:
  analyse:
    name: Run daily market scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run daily scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          KANSSCOUT_API_KEY: ${{ secrets.KANSSCOUT_API_KEY }}
        run: python jobs/daily_scan.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('KansScout daily scan failed — check job logs.');
