name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - "ios/**"
  workflow_dispatch:

jobs:
  build:
    name: Build & upload to TestFlight
    runs-on: macos-15        # Xcode 16 pre-installed; supports iOS 17+ targets
    timeout-minutes: 40

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Select Xcode version ────────────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app

      # ── 3. Install XcodeGen and regenerate project ─────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Regenerate Xcode project
        run: |
          cd ios
          xcodegen generate --spec project.yml

      # ── 4. Write Config.plist from secrets ────────────────────────────────
      - name: Write Config.plist
        run: |
          cat > ios/KansScout/Resources/Config.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_BASE_URL</key>
            <string>${{ secrets.API_BASE_URL }}</string>
            <key>API_KEY</key>
            <string>${{ secrets.KANSSCOUT_API_KEY }}</string>
          </dict>
          </plist>
          EOF

      # ── 5. Import signing certificate ─────────────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.DISTRIBUTION_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DISTRIBUTION_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: kansscout-ci
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # ── 6. Install provisioning profile ───────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/KansScout.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 7. Build archive ───────────────────────────────────────────────────
      - name: Build archive
        run: |
          xcodebuild archive \
            -project ios/KansScout.xcodeproj \
            -scheme KansScout \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/KansScout.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            | xcpretty

      # ── 8. Export IPA ──────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/KansScout.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            | xcpretty

      # ── 9. Upload to TestFlight ────────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          KEY_PATH=$RUNNER_TEMP/AuthKey.p8
          echo "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/export/KansScout.ipa" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key-path "$KEY_PATH" \
            --verbose

      # ── 10. Cleanup keychain ───────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/build.keychain || true
